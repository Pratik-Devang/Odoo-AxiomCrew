services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data

volumes:
  assetflow_pgdata:
